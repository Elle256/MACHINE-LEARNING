# FL-DTA Default Configuration

# Dataset
dataset: davis           # "davis" hoac "kiba"
data_dir: ./data/raw

# Model architecture
drug_encoder:
  num_features_drug: 168
  embed_dim: 128
  num_layers: 3
  hidden_dim: 128

protein_encoder:
  n_filters: 32
  embed_dim: 25
  num_features_protein: 25
  max_seq_len: 1000
  output_dim: 128

model:
  input_dim: 128
  dropout: 0.2
  n_output: 1

# Training
seed: 42
batch_size: 512
lr: 0.001
weight_decay: 1e-4

# Centralized training
centralized:
  epochs: 100

# Federated training
federated:
  algorithm: fedavg
  num_clients: 5
  fraction_fit: 1.0
  rounds: 100
  local_epochs: 5
  local_bs: 256
  dropout_rate: 0.0

# Data partition
partition:
  strategy: non_iid
  num_shards: 10
  alpha: 0.5

# Logging
logging:
  use_wandb: false
  project: fl-dta
  log_every: 1
  results_dir: ./results
